name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Node Version
        run: node --version

      - name: Check npm Version
        run: npm --version

      - name: Install Frontend Dependencies
        working-directory: ./frontend/@latest
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend/@latest
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Check Docker Version
        run: docker --version

      - name: Build Frontend Docker Image
        run: docker build -t asimabbasi1029/todo-frontend:latest ./frontend/@latest

      - name: Build Backend Docker Image
        run: docker build -t asimabbasi1029/todo-backend:latest ./backend

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Frontend Docker Image
        run: docker push asimabbasi1029/todo-frontend:latest

      - name: Push Backend Docker Image
        run: docker push asimabbasi1029/todo-backend:latest

  deploy:
    name: Deploy to AWS EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/todo-app

            echo "Pulling latest Docker images..."
            docker compose -f docker-compose-prod.yml pull

            echo "Restarting containers..."
            docker compose -f docker-compose-prod.yml up -d --remove-orphans

            echo "Removing unused images..."
            docker image prune -f

            echo "Deployment completed successfully!"