services:
  frontend:
    image: asimabbasi1029/todo-frontend:latest
    container_name: frontend
    ports:
      - "3000:4173"
    depends_on:
      - backend
    networks:
      - todo-network

  backend:
    image: asimabbasi1029/todo-backend:latest
    container_name: backend
    ports:
      - "5000:3000"
    environment:
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL: ${DB_SSL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo-network

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

volumes:
  postgres-data:

networks:
  todo-network: